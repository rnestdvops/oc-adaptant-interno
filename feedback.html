<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OC Adaptant Interno · Insights de uso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/styles.css" />
  <meta name="robots" content="noindex, nofollow" />
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">Adaptant · OC</div>
        <div class="brand-title">Insights de uso</div>
      </div>
      <div class="session-info">
        <a class="logout-btn" href="/chat.html">Volver al chat</a>
      </div>
    </div>

    <div class="feedback-page">
      <div class="tabs" id="tabs-bar">
        <button class="tab-btn active" data-tab="alerts">Alertas de agentes</button>
        <button class="tab-btn" data-tab="feedback">Feedback</button>
        <button class="tab-btn" data-tab="queries">Historial de consultas</button>
        <button class="tab-btn" data-tab="updates">Historia de Actualizaciones</button>
        <!-- Tab Errores: se agrega por JS solo si session.level === "socios" -->
      </div>

      <div class="tab-panel active" id="tab-alerts">
        <p id="alerts-status" style="font-size:13px;color:var(--gris);">Cargando...</p>
        <div id="alerts-list"></div>
      </div>

      <div class="tab-panel" id="tab-feedback">
        <p id="feedback-status" style="font-size:13px;color:var(--gris);">Cargando...</p>
        <div id="feedback-list"></div>
      </div>

      <div class="tab-panel" id="tab-queries">
        <p id="queries-status" style="font-size:13px;color:var(--gris);">Cargando...</p>
        <div id="queries-list"></div>
      </div>

      <div class="tab-panel" id="tab-updates">
        <p id="updates-status" style="font-size:13px;color:var(--gris);">Cargando...</p>
        <div id="updates-list"></div>
      </div>

      <div class="tab-panel" id="tab-errors">
        <p id="errors-status" style="font-size:13px;color:var(--gris);">Cargando...</p>
        <div id="errors-list"></div>
      </div>
    </div>
  </div>

  <script>
    window.OC_WORKER_URL = "https://oc-adaptant-interno.ernesto-b02.workers.dev";
  </script>
  <script src="/assets/auth.js"></script>
  <script>
    const { getSession, WORKER_URL: FB_WORKER_URL } = window.OCAuth;

    function fmtDate(ts) {
      return new Date(ts).toLocaleString("es-AR");
    }

    function escapeHtmlFb(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    async function loadFeedback() {
      const session = getSession();
      const statusEl = document.getElementById("feedback-status");
      const listEl = document.getElementById("feedback-list");

      try {
        const resp = await fetch(`${FB_WORKER_URL}/feedback`, {
          headers: { Authorization: `Bearer ${session.token}` },
        });
        if (resp.status === 401) {
          statusEl.textContent = "La sesión expiró. Volvé a entrar.";
          return;
        }
        const data = await resp.json();
        const entries = data.entries || [];

        if (entries.length === 0) {
          statusEl.textContent = "Todavía no hay feedback registrado.";
          return;
        }

        statusEl.textContent = `${entries.length} registro(s) de feedback.`;
        listEl.innerHTML = entries.map(e => `
          <div class="feedback-entry">
            <div class="meta">
              <span class="vote-tag ${e.vote}">${e.vote === "up" ? "👍 ok" : "👎 mejorar"}</span>
              <span>${e.level}</span>
              <span>${fmtDate(e.ts)}</span>
              ${e.query_id ? `<span class="query-link" title="${escapeHtmlFb(e.query_id)}">linked</span>` : ""}
            </div>
            ${e.question ? `<div class="q">Pregunta: ${escapeHtmlFb(e.question)}</div>` : ""}
            ${e.answer ? `<div class="a">Respuesta: ${escapeHtmlFb(e.answer).slice(0, 400)}${e.answer.length > 400 ? "…" : ""}</div>` : ""}
            ${e.comment ? `<div class="comment">"${escapeHtmlFb(e.comment)}"</div>` : ""}
          </div>
        `).join("");
      } catch (err) {
        statusEl.textContent = `Error cargando feedback: ${err.message}`;
      }
    }

    function renderQueryEntry(e) {
      const u = e.usage || {};
      const tokensSummary = u.input_tokens != null
        ? `<span class="tok">in:${u.input_tokens} · cache_read:${u.cache_read_input_tokens || 0} · cache_write:${u.cache_creation_input_tokens || 0} · out:${u.output_tokens || 0}</span>`
        : "";
      const truncatedTag = e.answer_truncated ? `<span class="trunc-tag">truncado</span>` : "";

      return `
        <details class="query-entry">
          <summary>
            <div class="query-summary-row">
              <span class="level-tag ${e.level}">${e.level}</span>
              <span class="query-date">${fmtDate(e.ts)}</span>
              ${tokensSummary}
              ${truncatedTag}
            </div>
            <div class="query-question">${escapeHtmlFb(e.question || "(sin pregunta)")}</div>
          </summary>
          <div class="query-details">
            <div class="query-answer">${escapeHtmlFb(e.answer_preview || "(sin respuesta)")}</div>
            <div class="query-meta-row">
              <span class="mono">query_id: ${escapeHtmlFb(e.query_id || "—")}</span>
            </div>
          </div>
        </details>
      `;
    }

    async function loadQueries() {
      const session = getSession();
      const statusEl = document.getElementById("queries-status");
      const listEl = document.getElementById("queries-list");

      try {
        const resp = await fetch(`${FB_WORKER_URL}/queries`, {
          headers: { Authorization: `Bearer ${session.token}` },
        });
        if (resp.status === 401) {
          statusEl.textContent = "La sesión expiró. Volvé a entrar.";
          return;
        }
        const data = await resp.json();
        const entries = data.entries || [];

        if (entries.length === 0) {
          statusEl.textContent = "Todavía no hay consultas registradas. Hacé una pregunta en el chat y volvé.";
          return;
        }

        const totalTokens = entries.reduce((acc, e) => acc + ((e.usage?.input_tokens || 0) + (e.usage?.output_tokens || 0)), 0);
        const cacheRead = entries.reduce((acc, e) => acc + (e.usage?.cache_read_input_tokens || 0), 0);
        const cachePct = totalTokens > 0 ? Math.round((cacheRead / (totalTokens + cacheRead)) * 100) : 0;

        statusEl.innerHTML = `
          <strong>${entries.length}</strong> consulta(s) registrada(s) ·
          tokens nuevos: <strong>${totalTokens.toLocaleString("es-AR")}</strong> ·
          cache hit: <strong>${cachePct}%</strong>
          ${data.list_complete === false ? "<br><em>Atención: la lista podría estar incompleta (más de 1000 entries en KV).</em>" : ""}
        `;
        listEl.innerHTML = entries.map(renderQueryEntry).join("");
      } catch (err) {
        statusEl.textContent = `Error cargando consultas: ${err.message}`;
      }
    }

    function setupTabs() {
      const buttons = document.querySelectorAll(".tab-btn");
      const panels = document.querySelectorAll(".tab-panel");

      buttons.forEach(btn => {
        btn.addEventListener("click", () => {
          const target = btn.dataset.tab;
          buttons.forEach(b => b.classList.toggle("active", b === btn));
          panels.forEach(p => p.classList.toggle("active", p.id === `tab-${target}`));
        });
      });
    }

    function renderReleaseEntry(r) {
      const sectionHtml = (label, cls, items) => {
        if (!items || items.length === 0) return "";
        return `
          <div class="release-section ${cls}">
            <div class="release-section-label">${label}</div>
            <ul>${items.map(it => `<li>${escapeHtmlFb(it)}</li>`).join("")}</ul>
          </div>
        `;
      };
      const notasHtml = r.notas
        ? `<div class="release-notas">${escapeHtmlFb(r.notas)}</div>`
        : "";
      return `
        <div class="release-entry">
          <div class="release-header">
            <span class="release-version">v${escapeHtmlFb(r.version)}</span>
            <span class="release-titulo">${escapeHtmlFb(r.titulo || "")}</span>
            <span class="release-fecha mono">${escapeHtmlFb(r.fecha || "")}</span>
          </div>
          ${sectionHtml("Added", "added", r.added)}
          ${sectionHtml("Changed", "changed", r.changed)}
          ${sectionHtml("Fixed", "fixed", r.fixed)}
          ${sectionHtml("Removed", "removed", r.removed)}
          ${notasHtml}
        </div>
      `;
    }

    async function loadUpdates() {
      const statusEl = document.getElementById("updates-status");
      const listEl = document.getElementById("updates-list");

      try {
        // El changelog es un archivo estático servido por Netlify — no necesita
        // pasar por el Worker. Es público (no expone datos sensibles).
        const resp = await fetch("/datamarts/changelog.json", { cache: "no-store" });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const releases = data.releases || [];

        if (releases.length === 0) {
          statusEl.textContent = "Todavía no hay releases registradas.";
          return;
        }

        statusEl.innerHTML = `<strong>${releases.length}</strong> release(s) · última: <strong>v${escapeHtmlFb(releases[0].version)}</strong> (${escapeHtmlFb(releases[0].fecha)})`;
        listEl.innerHTML = releases.map(renderReleaseEntry).join("");
      } catch (err) {
        statusEl.textContent = `Error cargando changelog: ${err.message}`;
      }
    }

    function renderAlertEntry(e) {
      const dateStr = fmtDate(e.ts);
      const itemsHtml = (e.items || []).map(it => {
        const monto = it.monto_ars != null
          ? `$${Number(it.monto_ars).toLocaleString("es-AR", { maximumFractionDigits: 0 })} ARS`
          : it.monto_usd != null
            ? `USD ${Number(it.monto_usd).toLocaleString("en-US", { minimumFractionDigits: 2 })}`
            : it.monto_aprox_ars != null
              ? `~$${Number(it.monto_aprox_ars).toLocaleString("es-AR", { maximumFractionDigits: 0 })} ARS`
              : "";
        const nivelTag = it.nivel ? `<span class="alert-level-tag ${(it.nivel || '').toLowerCase()}">${escapeHtmlFb(it.nivel)}</span>` : "";
        return `
          <div class="alert-item">
            <span class="alert-date mono">${escapeHtmlFb(it.fecha || "")}</span>
            <div class="alert-item-body">
              <div class="alert-entidad">${escapeHtmlFb(it.entidad || "")}</div>
              <div class="alert-obligacion">${escapeHtmlFb(it.obligacion || "")}</div>
              ${monto ? `<div class="alert-monto mono">${monto}</div>` : ""}
            </div>
            ${nivelTag}
          </div>
        `;
      }).join("");

      return `
        <div class="alert-entry">
          <div class="alert-header">
            <span class="agent-tag">${escapeHtmlFb(e.agent_id)}</span>
            <span class="alert-titulo">${escapeHtmlFb(e.titulo || "")}</span>
            <span class="alert-ts">${dateStr}</span>
          </div>
          <div class="alert-items">${itemsHtml}</div>
        </div>
      `;
    }

    async function loadAlerts() {
      const session = getSession();
      const statusEl = document.getElementById("alerts-status");
      const listEl = document.getElementById("alerts-list");

      try {
        const resp = await fetch(`${FB_WORKER_URL}/alerts`, {
          headers: { Authorization: `Bearer ${session.token}` },
        });
        if (resp.status === 401) {
          statusEl.textContent = "La sesión expiró. Volvé a entrar.";
          return;
        }
        const data = await resp.json();
        const entries = data.entries || [];

        const isSocios = session.level === "socios";
        const runBtnHtml = isSocios
          ? `<button class="run-agent-btn" id="run-vencimientos-btn">Disparar agente Vencimientos 7d ahora</button>`
          : "";
        const clearBtnHtml = isSocios
          ? `<button class="run-agent-btn" id="clear-alerts-btn" style="background:var(--gris);margin-left:6px;">Limpiar alertas</button>`
          : "";

        if (entries.length === 0) {
          statusEl.innerHTML = `Todavía no hay alertas generadas por agentes. ${runBtnHtml}`;
        } else {
          statusEl.innerHTML = `<strong>${entries.length}</strong> alerta(s) registradas. ${runBtnHtml}${clearBtnHtml}`;
          listEl.innerHTML = entries.map(renderAlertEntry).join("");
        }

        const btn = document.getElementById("run-vencimientos-btn");
        if (btn) {
          btn.onclick = async () => {
            btn.disabled = true;
            btn.textContent = "Ejecutando...";
            try {
              await fetch(`${FB_WORKER_URL}/agents/run`, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  Authorization: `Bearer ${session.token}`,
                },
                body: JSON.stringify({ agent_id: "vencimientos-7d" }),
              });
              await loadAlerts();
            } catch (err) {
              btn.disabled = false;
              btn.textContent = `Error: ${err.message}`;
            }
          };
        }

        const clearBtn = document.getElementById("clear-alerts-btn");
        if (clearBtn) {
          clearBtn.onclick = async () => {
            if (!confirm("¿Eliminar todas las alertas? Esta acción no se puede deshacer.")) return;
            clearBtn.disabled = true;
            clearBtn.textContent = "Eliminando...";
            try {
              const r = await fetch(`${FB_WORKER_URL}/alerts`, {
                method: "DELETE",
                headers: { Authorization: `Bearer ${session.token}` },
              });
              const d = await r.json();
              clearBtn.textContent = `Limpiar alertas (${d.deleted || 0} eliminadas)`;
              await loadAlerts();
            } catch (err) {
              clearBtn.disabled = false;
              clearBtn.textContent = `Error: ${err.message}`;
            }
          };
        }
      } catch (err) {
        statusEl.textContent = `Error cargando alertas: ${err.message}`;
      }
    }

    function renderErrorEntry(e) {
      const dt = new Date(e.ts).toLocaleString("es-AR");
      const typeTag = e.error_type
        ? `<span class="mono" style="font-size:11px;background:rgba(184,50,20,.1);color:var(--critico);padding:2px 6px;border-radius:3px;">${escapeHtmlFb(e.error_type)}</span>`
        : "";
      const levelTag = e.user_level
        ? `<span class="level-tag ${escapeHtmlFb(e.user_level)}">${escapeHtmlFb(e.user_level)}</span>`
        : "";
      const refTag = e.request_id
        ? `<span class="mono" style="font-size:10.5px;color:var(--gris2);">ref: ${escapeHtmlFb(e.request_id.slice(0, 8))}</span>`
        : "";
      return `
        <div class="query-entry" style="border-left:3px solid var(--critico);padding-left:10px;margin-bottom:8px;">
          <div class="query-summary-row" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px;">
            ${levelTag}
            ${typeTag}
            <span class="query-date">${dt}</span>
            ${refTag}
          </div>
          <div class="query-question" style="color:var(--gris);font-size:12.5px;">${escapeHtmlFb(e.message || e.event || "—")}</div>
        </div>
      `;
    }

    async function loadErrors() {
      const session = getSession();
      const statusEl = document.getElementById("errors-status");
      const listEl = document.getElementById("errors-list");
      try {
        const resp = await fetch(`${FB_WORKER_URL}/errors`, {
          headers: { Authorization: `Bearer ${session.token}` },
        });
        if (resp.status === 401) { statusEl.textContent = "La sesión expiró. Volvé a entrar."; return; }
        if (resp.status === 403) { statusEl.textContent = "Solo socios pueden ver el log de errores."; return; }
        const data = await resp.json();
        const entries = data.entries || [];
        if (entries.length === 0) {
          statusEl.textContent = "Sin errores registrados. Todo bien.";
          return;
        }
        statusEl.innerHTML = `<strong>${entries.length}</strong> error(es) registrado(s) en los últimos 30 días.`;
        listEl.innerHTML = entries.map(renderErrorEntry).join("");
      } catch (err) {
        statusEl.textContent = `Error cargando log: ${err.message}`;
      }
    }

    async function init() {
      const session = getSession();
      if (!session) {
        window.location.href = "/";
        return;
      }

      // Tab Errores solo visible para socios
      if (session.level === "socios") {
        const tabsBar = document.getElementById("tabs-bar");
        const errBtn = document.createElement("button");
        errBtn.className = "tab-btn";
        errBtn.dataset.tab = "errors";
        errBtn.textContent = "Errores";
        tabsBar.appendChild(errBtn);
      }

      setupTabs();
      const loads = [loadUpdates(), loadAlerts(), loadFeedback(), loadQueries()];
      if (session.level === "socios") loads.push(loadErrors());
      await Promise.all(loads);
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
